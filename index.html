<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text to Speech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>AI reading text</h2>
        
        <textarea id="text" dir="rtl" placeholder="Type or paste text here (English, Hebrew, Arabic, etc.)..."></textarea>
        
        <div class="controls-container">
            <div class="speed-wrapper">
                <label for="speed">Speed:</label> <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
            </div>

            <div class="button-group">
                <button id="play-button">Play</button>
                <button id="pause-button">Pause</button>
                <button id="stop-button">Stop</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
